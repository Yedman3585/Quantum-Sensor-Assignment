
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera-Server Optimization</title>
    <script src="https://cdn.plotly.com/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; }
        .viz { border: 1px solid #ccc; padding: 10px; }
        #annealingAnim, #assignments, #progress { width: 400px; height: 400px; }
    </style>
</head>
<body>
    <h1>Camera-Server Optimization</h1>
    <div class="container">
        <div>
            <h3>Parameters</h3>
            <input type="number" id="n_cameras" value="20000" min="1000" max="20000"><label>Cameras</label><br>
            <input type="number" id="n_servers" value="800" min="100" max="800"><label>Servers</label><br>
            <input type="number" id="batch_size" value="80" min="10" max="100"><label>Batch Size</label><br>
            <input type="number" id="max_servers_per_batch" value="20" min="5" max="50"><label>Max Servers/Batch</label><br>
            <button onclick="runOptimization('greedy')">Run Greedy</button>
            <button onclick="runOptimization('quantum')">Run Quantum</button>
            <button onclick="stopOptimization()">Stop</button>
        </div>
        <div class="viz" id="annealingAnim">
            <h3>Quantum Annealing Animation</h3>
            <div id="annealingPlot"></div>
            <script>
                let annealingData = {
                    x: [], y: [], z: [], type: 'surface', colorscale: 'Viridis'
                };
                let pathData = { x: [], y: [], z: [], mode: 'lines', line: { color: 'red' } };
                let quantumPathData = { x: [], y: [], z: [], mode: 'lines', line: { color: 'blue' } };
                function animateAnnealing() {
                    // Simulate annealing animation (placeholder)
                    const x = new Array(50).fill().map((_, i) => i / 10 - 2.5);
                    const y = x;
                    const [X, Y] = [new Array(50).fill().map(() => x), Array(50).fill(y)];
                    const Z = X.map((row, i) => row.map((x, j) => Math.sin(x) * Math.cos(Y[i][j]) + 0.1 * (x**2 + Y[i][j]**2)));
                    annealingData.x = X; annealingData.y = Y; annealingData.z = Z;
                    Plotly.newPlot('annealingPlot', [annealingData, pathData, quantumPathData], { margin: { t: 0 } });
                    // Add animation logic here
                }
                setInterval(animateAnnealing, 1000);
            </script>
        </div>
        <div class="viz" id="assignments">
            <h3>Assignments</h3>
            <div id="assignmentsPlot"></div>
        </div>
        <div class="viz" id="progress">
            <h3>Progress</h3>
            <div id="progressPlot"></div>
        </div>
    </div>
    <div id="logs"></div>
    <script>
        async function runOptimization(method) {
            const params = {
                n_cameras: document.getElementById('n_cameras').value,
                n_servers: document.getElementById('n_servers').value,
                batch_size: document.getElementById('batch_size').value,
                max_servers_per_batch: document.getElementById('max_servers_per_batch').value,
                method: method
            };
            const response = await fetch('/run_optimization', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            const result = await response.json();
            document.getElementById('logs').innerHTML += `<p>${JSON.stringify(result)}</p>`;
        }
        function stopOptimization() {
            // Implement stop logic (e.g., terminate thread)
            alert("Stopping not yet implemented");
        }
    </script>
</body>
</html>
